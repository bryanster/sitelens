{{define "head"}}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/style.css">
<script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
{{end}}

{{define "nav"}}
<nav class="topnav">
  <a href="/" class="topnav-brand">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    SiteLens
  </a>
  <div class="topnav-links">
    <a href="/" class="topnav-link {{if eq .ActivePage "categorize"}}active{{end}}">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      Categorize
    </a>
    <a href="/search" class="topnav-link {{if eq .ActivePage "search"}}active{{end}}">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Search
    </a>
    <div class="topnav-sep"></div>
    <a href="/api/export" class="topnav-link topnav-link-subtle">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export CSV
    </a>
  </div>
</nav>
{{end}}

{{define "stat-bar"}}
<div class="stat-bar">
  <div class="stat-item">
    <div class="stat-icon stat-icon-neutral">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
    </div>
    <div class="stat-body">
      <span class="stat-num">{{.Stats.Total}}</span>
      <span class="stat-lbl">Total sites</span>
    </div>
  </div>
  <div class="stat-item">
    <div class="stat-icon stat-icon-green">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="stat-body">
      <span class="stat-num {{if gt .Stats.Done 0}}stat-green{{end}}">{{.Stats.Done}}</span>
      <span class="stat-lbl">Categorized</span>
    </div>
  </div>
  <div class="stat-item">
    <div class="stat-icon {{if gt .Stats.Pending 0}}stat-icon-amber{{else}}stat-icon-neutral{{end}}">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>
    <div class="stat-body">
      <span class="stat-num {{if gt .Stats.Pending 0}}stat-amber{{end}}">{{.Stats.Pending}}</span>
      <span class="stat-lbl">In progress</span>
    </div>
  </div>
  <div class="stat-item">
    <div class="stat-icon stat-icon-indigo">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
    </div>
    <div class="stat-body">
      <span class="stat-num {{if gt .Stats.Categories 0}}stat-indigo{{end}}">{{.Stats.Categories}}</span>
      <span class="stat-lbl">Categories</span>
    </div>
  </div>
</div>
{{end}}
